<!DOCTYPE html>
<html>
<head>
  <title>OG Image Generator — SVG to PNG</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">

  <style>
    body { font-family: system-ui; padding: 2rem; text-align: center; }
    canvas { border: 1px solid #ccc; max-width: 100%; }
    button { padding: 0.8rem 2rem; font-size: 1rem; margin: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>OG Image Generator</h1>
  <p>Renders og-image.png at 1280×640 and exports as PNG</p>
  <canvas id="canvas" width="1280" height="640"></canvas>
  <br>
  <button onclick="download()">Download og-image.png</button>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = function() {
      ctx.drawImage(img, 0, 0, 1280, 640);
      // Auto-download on load (optional)
      // download();
    };
    img.src = 'og-image.png';
    
    function download() {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
